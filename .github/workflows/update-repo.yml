name: Update 1Password ARM Repo

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自动检查更新
  workflow_dispatch:      # 允许你点击按钮手动触发更新

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gpg dpkg-dev curl

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch

      - name: Download 1Password and Build DEB
        run: |
          # 1. 获取最新版本号 (从官方历史页面抓取)
          VERSION=$(curl -s https://app-updates.agilebits.com/product_history/1PL | grep -oP '(?<=<b>)\d+\.\d+\.\d+(?=</b>)' | head -n 1)
          echo "Detected Latest Version: $VERSION"
          
          # 2. 下载 ARM64 压缩包
          curl -L -o 1password-latest.tar.gz https://downloads.1password.com/linux/tar/stable/aarch64/1password-latest.tar.gz
          
          # 3. 创建打包目录结构
          mkdir -p package/opt/1Password
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/etc/xdg/autostart
          mkdir -p package/DEBIAN
          
          # 4. 解压到 /opt/1Password
          tar -xzf 1password-latest.tar.gz -C package/opt/1Password --strip-components=1
          
          # 5. 配置桌面快捷方式 (菜单栏图标)
          if [ -f "package/opt/1Password/resources/1password.desktop" ]; then
            cp package/opt/1Password/resources/1password.desktop package/usr/share/applications/
            # 修正图标路径
            sed -i 's|Icon=1password|Icon=/opt/1Password/resources/1password.png|g' package/usr/share/applications/1password.desktop
          fi

          # 6. 配置登录自启动 (XDG Autostart)
          cat <<EOF > package/etc/xdg/autostart/1password-autostart.desktop
          [Desktop Entry]
          Name=1Password Autostart
          Exec=/opt/1Password/1password --silent
          Terminal=false
          Type=Application
          Icon=/opt/1Password/resources/1password.png
          Categories=Security;
          X-GNOME-Autostart-enabled=true
          Comment=Start 1Password in the background on login
          EOF

          # 7. 创建 Debian 控制文件 (包含必要依赖)
          cat <<EOF > package/DEBIAN/control
          Package: 1password
          Version: $VERSION
          Architecture: arm64
          Maintainer: Krystic <ice@krystic.com>
          Depends: libasound2, libpango-1.0-0, libxtst6, libnss3, libcurl4, libgbm1
          Description: 1Password for Linux ARM (Automatically built via GitHub Actions)
          EOF

          # 8. 创建安装后脚本 (postinst)
          cat <<EOF > package/DEBIAN/postinst
          #!/bin/bash
          set -e
          # 创建命令软链接
          ln -sf /opt/1Password/1password /usr/bin/1password
          # 执行官方初始化脚本 (处理浏览器集成、内核沙盒等)
          if [ -f "/opt/1Password/after-install.sh" ]; then
            chmod +x /opt/1Password/after-install.sh
            /opt/1Password/after-install.sh
          fi
          # 刷新桌面数据库
          if [ -x "\$(command -v update-desktop-database)" ]; then
            update-desktop-database -q /usr/share/applications || true
          fi
          echo "1Password ARM 安装成功！已配置登录自启动 (--silent)。"
          EOF

          # 9. 创建卸载前脚本 (prerm)
          cat <<EOF > package/DEBIAN/prerm
          #!/bin/bash
          set -e
          rm -f /usr/bin/1password
          EOF

          # 设置脚本权限
          chmod 755 package/DEBIAN/postinst package/DEBIAN/prerm
          
          # 10. 正式打包
          dpkg-deb --build package 1password_${VERSION}_arm64.deb

      - name: Update Reprepro Repository
        run: |
          # 清理旧数据确保仓库纯净
          rm -rf conf db pool dists
          
          # 创建 Reprepro 配置文件
          mkdir -p conf
          cat <<EOF > conf/distributions
          Origin: 1Password-ARM-Repo
          Label: 1Password-ARM-Repo
          Codename: stable
          Architectures: arm64
          Components: main
          Description: Personal APT Repository for 1Password Linux ARM
          SignWith: ${{ secrets.GPG_KEY_ID }}
          EOF
          
          # 将生成的 deb 文件加入仓库
          reprepro -b . includedeb stable 1password_*.deb

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
