name: Update 1Password ARM Repo

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch:      

permissions:
  contents: write
  pages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro gpg dpkg-dev curl

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch

      - name: Download 1Password and Build DEB
        run: |
          # 1. 下载并提取版本
          curl -L -o 1password-latest.tar.gz https://downloads.1password.com/linux/tar/stable/aarch64/1password-latest.tar.gz
          tar -xzf 1password-latest.tar.gz
          DIR_NAME=$(ls -d 1password-*.arm64/ | head -n 1 | sed 's/\///g')
          VERSION=$(echo $DIR_NAME | grep -oP '\d+\.\d+\.\d+')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          
          # 2. 创建目录结构
          mkdir -p package/opt/1Password package/usr/bin package/usr/share/applications package/etc/xdg/autostart package/DEBIAN
          mv $DIR_NAME/* package/opt/1Password/
          
          # 3. 配置快捷方式和自启动
          if [ -f "package/opt/1Password/resources/1password.desktop" ]; then
            cp package/opt/1Password/resources/1password.desktop package/usr/share/applications/
            sed -i 's|Icon=1password|Icon=/opt/1Password/resources/1password.png|g' package/usr/share/applications/1password.desktop
          fi
          cat <<EOF > package/etc/xdg/autostart/1password-autostart.desktop
          [Desktop Entry]
          Name=1Password Autostart
          Exec=/opt/1Password/1password --silent
          Terminal=false
          Type=Application
          Icon=/opt/1Password/resources/1password.png
          X-GNOME-Autostart-enabled=true
          EOF

          # 4. 创建 Control 文件 (加入 Section 解决 reprepro 报错)
          cat <<EOF > package/DEBIAN/control
          Package: 1password
          Version: $VERSION
          Architecture: arm64
          Maintainer: Krystic <ice@krystic.com>
          Depends: libasound2, libpango-1.0-0, libxtst6, libnss3, libcurl4, libgbm1
          Section: utils
          Priority: optional
          Description: 1Password for Linux ARM (Auto-built)
          EOF

          # 5. 创建脚本
          cat <<EOF > package/DEBIAN/postinst
          #!/bin/bash
          ln -sf /opt/1Password/1password /usr/bin/1password
          [ -f "/opt/1Password/after-install.sh" ] && chmod +x /opt/1Password/after-install.sh && /opt/1Password/after-install.sh
          [ -x "\$(command -v update-desktop-database)" ] && update-desktop-database -q /usr/share/applications || true
          EOF
          chmod 755 package/DEBIAN/postinst
          
          # 6. 打包
          dpkg-deb --build package 1password_${VERSION}_arm64.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          files: 1password_${{ env.VERSION }}_arm64.deb
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Reprepro Repository
        run: |
          # 1. 初始化仓库配置
          mkdir -p conf
          cat <<EOF > conf/distributions
          Origin: 1Password-ARM-Repo
          Label: 1Password-ARM-Repo
          Codename: stable
          Architectures: arm64
          Components: main
          SignWith: ${{ secrets.GPG_KEY_ID }}
          EOF
          
          # 2. 生成本地索引
          reprepro -b . includedeb stable 1password_${{ env.VERSION }}_arm64.deb

          # 3. 【核心步骤】重写索引中的路径，指向 Release 链接
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/v${{ env.VERSION }}/1password_${{ env.VERSION }}_arm64.deb"
          sed -i "s|Filename: pool/main/.*\.deb|Filename: ${RELEASE_URL}|g" dists/stable/main/binary-arm64/Packages
          
          # 4. 重新计算压缩包
          gzip -fk dists/stable/main/binary-arm64/Packages
          
          # 5. 重新生成 Release 文件（因为 Packages 和 Packages.gz 已更改）
          cd dists/stable
          rm -f Release Release.gpg InRelease
          
          cat <<EOF > Release
          Origin: 1Password-ARM-Repo
          Label: 1Password-ARM-Repo
          Codename: stable
          Architectures: arm64
          Components: main
          Date: $(date -Ru)
          EOF
          
          # 计算所有索引文件的哈希
          {
            echo "MD5Sum:"
            for f in main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              [ -f "$f" ] && echo " $(md5sum "$f" | cut -d' ' -f1) $(wc -c < "$f" | tr -d ' ') $f"
            done
            echo "SHA1:"
            for f in main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              [ -f "$f" ] && echo " $(sha1sum "$f" | cut -d' ' -f1) $(wc -c < "$f" | tr -d ' ') $f"
            done
            echo "SHA256:"
            for f in main/binary-arm64/Packages main/binary-arm64/Packages.gz; do
              [ -f "$f" ] && echo " $(sha256sum "$f" | cut -d' ' -f1) $(wc -c < "$f" | tr -d ' ') $f"
            done
          } >> Release
          
          # 签名 Release 文件
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --clearsign -o InRelease Release
          
          cd ../..
          
          # 6. 清理：只保留 dists 目录和 conf 目录，删掉超过 100MB 的文件
          rm -rf pool/ package/ *.deb *.tar.gz 1password-*.arm64/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: true
